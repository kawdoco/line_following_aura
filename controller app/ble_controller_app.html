<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PID Controller</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }

    h1 {
      font-size: 20px;
    }

    .section {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type=range] {
      width: 100%;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    #status {
      font-size: 13px;
      color: gray;
      margin-top: 10px;
    }

    input[type=text] {
      padding: 6px;
      font-size: 14px;
      width: 200px;
      margin-right: 5px;
    }

    select {
      padding: 6px;
      font-size: 14px;
      width: 220px;
      margin-right: 5px;
    }

    .star-row {
      display: flex;
      gap: 5px;
      margin: 10px 0 4px 0;
    }

    .star {
      font-size: 22px;
      cursor: pointer;
      color: #ccc;
    }

    .star.active {
      color: gold;
    }

    .star-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 10px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      text-align: left;
    }

    th {
      background: #eee;
    }

    textarea {
      width: 100%;
      font-size: 13px;
      padding: 6px;
    }
  </style>
</head>

<body>

  <h1>PID Robot Controller</h1>
  <p id="status">Status: Not Connected</p>


  <div class="section">
    <button id="connectBtn" onclick="connectBLE()">Connect via Bluetooth</button>
    <button id="disconnectBtn" onclick="disconnectBLE()" disabled>Disconnect</button>
  </div>


  <div class="section">
    <label>P Value: <span id="pVal">1.00</span></label>
    <input type="range" id="pSlider" min="0" max="5" step="0.01" value="1.00" oninput="updateVal('p')" />
    <label>I Value: <span id="iVal">0.000</span></label>
    <input type="range" id="iSlider" min="0" max="1" step="0.001" value="0.000" oninput="updateVal('i')" />
    <label>D Value: <span id="dVal">0.00</span></label>
    <input type="range" id="dSlider" min="0" max="3" step="0.01" value="0.00" oninput="updateVal('d')" />
    <div class="star-label">Rate this run (click to auto-log):</div>
    <div class="star-row" id="starRow">
      <span class="star" onclick="setRatingAndLog(1)">★</span>
      <span class="star" onclick="setRatingAndLog(2)">★</span>
      <span class="star" onclick="setRatingAndLog(3)">★</span>
      <span class="star" onclick="setRatingAndLog(4)">★</span>
      <span class="star" onclick="setRatingAndLog(5)">★</span>
    </div>
  </div>


  <div class="section">
    <button id="sendBtn" onclick="sendPID()" disabled>Send PID Values</button>
    <button id="startBtn" onclick="startRobot()" disabled>START ROBOT</button>
    <button id="stopBtn" onclick="stopRobot()" disabled>STOP ROBOT</button>
  </div>


  <div class="section">
    <h3 style="margin-top:0">Presets</h3>
    <input type="text" id="presetName" placeholder="Preset name e.g. sharp turns" />
    <button onclick="savePreset()">Save Preset</button>
    <br><br>
    <select id="presetList">
      <option value="">-- Load a preset --</option>
    </select>
    <button onclick="loadPreset()">Load</button>
    <button onclick="deletePreset()">Delete</button>
  </div>


  <div class="section">
    <h3 style="margin-top:0">Test Log History</h3>
    <button onclick="exportTXT()">Export as TXT</button>
    <button onclick="exportMD()">Export as Markdown</button>
    <button onclick="clearLogs()" style="color:red;">Clear All Logs</button>
    <div id="logTable" style="margin-top:10px;"></div>
  </div>

  <script>
    const SERVICE_UUID = "12345678-1234-1234-1234-123456789abc";
    const CHAR_P_UUID = "12345678-1234-1234-1234-123456789001";
    const CHAR_I_UUID = "12345678-1234-1234-1234-123456789002";
    const CHAR_D_UUID = "12345678-1234-1234-1234-123456789003";
    const CHAR_START_UUID = "12345678-1234-1234-1234-123456789004";

    let device, server, service, charP, charI, charD, charStart;

    function setStatus(msg) { document.getElementById("status").textContent = "Status: " + msg; }

    function updateVal(axis) {
      const dec = axis === 'i' ? 3 : 2;
      const val = parseFloat(document.getElementById(axis + "Slider").value).toFixed(dec);
      document.getElementById(axis + "Val").textContent = val;
    }

    async function connectBLE() {
      try {
        setStatus("Scanning...");
        device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        device.addEventListener('gattserverdisconnected', onDisconnected);
        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        charP = await service.getCharacteristic(CHAR_P_UUID);
        charI = await service.getCharacteristic(CHAR_I_UUID);
        charD = await service.getCharacteristic(CHAR_D_UUID);
        charStart = await service.getCharacteristic(CHAR_START_UUID);
        setStatus("Connected to " + device.name);
        ["connectBtn"].forEach(id => document.getElementById(id).disabled = true);
        ["disconnectBtn", "sendBtn", "startBtn", "stopBtn"].forEach(id => document.getElementById(id).disabled = false);
      } catch (e) { setStatus("Error: " + e.message); }
    }

    function onDisconnected() {
      setStatus("Disconnected");
      document.getElementById("connectBtn").disabled = false;
      ["disconnectBtn", "sendBtn", "startBtn", "stopBtn"].forEach(id => document.getElementById(id).disabled = true);
    }

    function disconnectBLE() { if (device && device.gatt.connected) device.gatt.disconnect(); }

    function floatToBytes(val) {
      const buf = new ArrayBuffer(4);
      new DataView(buf).setFloat32(0, val, true);
      return new Uint8Array(buf);
    }

    async function sendPID() {
      try {
        await charP.writeValue(floatToBytes(parseFloat(document.getElementById("pSlider").value)));
        await charI.writeValue(floatToBytes(parseFloat(document.getElementById("iSlider").value)));
        await charD.writeValue(floatToBytes(parseFloat(document.getElementById("dSlider").value)));
        setStatus("PID values sent");
      } catch (e) { setStatus("Send error: " + e.message); }
    }

    async function startRobot() {
      try { await sendPID(); await charStart.writeValue(new Uint8Array([1])); setStatus("Robot started"); }
      catch (e) { setStatus("Start error: " + e.message); }
    }

    async function stopRobot() {
      try { await charStart.writeValue(new Uint8Array([0])); setStatus("Robot stopped"); }
      catch (e) { setStatus("Stop error: " + e.message); }
    }

    //PRESETS
    function getPresets() { return JSON.parse(localStorage.getItem("pid_presets") || "{}"); }
    function savePresets(p) { localStorage.setItem("pid_presets", JSON.stringify(p)); }

    function savePreset() {
      const name = document.getElementById("presetName").value.trim();
      if (!name) return alert("Enter a preset name");
      const presets = getPresets();
      presets[name] = {
        p: document.getElementById("pSlider").value,
        i: document.getElementById("iSlider").value,
        d: document.getElementById("dSlider").value
      };
      savePresets(presets);
      refreshPresetList();
      document.getElementById("presetName").value = "";
      setStatus("Preset saved: " + name);
    }

    function loadPreset() {
      const name = document.getElementById("presetList").value;
      if (!name) return;
      const preset = getPresets()[name];
      if (!preset) return;
      document.getElementById("pSlider").value = preset.p; updateVal('p');
      document.getElementById("iSlider").value = preset.i; updateVal('i');
      document.getElementById("dSlider").value = preset.d; updateVal('d');
      setStatus("Preset loaded: " + name);
    }

    function deletePreset() {
      const name = document.getElementById("presetList").value;
      if (!name) return;
      const presets = getPresets();
      delete presets[name];
      savePresets(presets);
      refreshPresetList();
      setStatus("Preset deleted: " + name);
    }

    function refreshPresetList() {
      const sel = document.getElementById("presetList");
      const presets = getPresets();
      sel.innerHTML = '<option value="">-- Load a preset --</option>';
      Object.keys(presets).forEach(name => {
        const opt = document.createElement("option");
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });
    }

    //LOGGING
    function getLogs() { return JSON.parse(localStorage.getItem("pid_logs") || "[]"); }
    function saveLogs(l) { localStorage.setItem("pid_logs", JSON.stringify(l)); }

    function setRatingAndLog(n) {
      document.querySelectorAll(".star").forEach((s, i) => {
        s.classList.toggle("active", i < n);
      });
      const p = parseFloat(document.getElementById("pSlider").value).toFixed(2);
      const i = parseFloat(document.getElementById("iSlider").value).toFixed(3);
      const d = parseFloat(document.getElementById("dSlider").value).toFixed(2);
      const datetime = new Date().toISOString().slice(0, 16).replace("T", " ");
      const logs = getLogs();
      logs.push({ datetime, p, i, d, rating: n });
      saveLogs(logs);
      renderLogs();
      setStatus("Run logged (" + "★".repeat(n) + ") at " + datetime);
      setTimeout(() => document.querySelectorAll(".star").forEach(s => s.classList.remove("active")), 800);
    }

    function renderLogs() {
      const logs = getLogs();
      if (logs.length === 0) {
        document.getElementById("logTable").innerHTML = "<p style='color:gray;font-size:13px;'>No logs yet.</p>";
        return;
      }
      let html = "<table><tr><th>Date/Time</th><th>P</th><th>I</th><th>D</th><th>Rating</th></tr>";
      [...logs].reverse().forEach(e => {
        const stars = "★".repeat(e.rating) + "☆".repeat(5 - e.rating);
        html += `<tr><td>${e.datetime}</td><td>${e.p}</td><td>${e.i}</td><td>${e.d}</td><td>${stars}</td></tr>`;
      });
      html += "</table>";
      document.getElementById("logTable").innerHTML = html;
    }

    function clearLogs() {
      if (confirm("Clear all logs?")) { localStorage.removeItem("pid_logs"); renderLogs(); }
    }

    function downloadFile(filename, content) {
      const a = document.createElement("a");
      a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(content);
      a.download = filename;
      a.click();
    }

    function exportTXT() {
      const logs = getLogs();
      if (!logs.length) return alert("No logs to export");
      const now = new Date().toISOString().slice(0, 16).replace("T", " ");
      let out = "================================================\n";
      out += "  PID TUNING LOG — EXPORTED " + now + "\n";
      out += "================================================\n\n";
      logs.forEach((e, idx) => {
        const stars = "★".repeat(e.rating) + "☆".repeat(5 - e.rating);
        out += `[SESSION ${idx + 1}]\n`;
        out += `Date/Time  : ${e.datetime}\n`;
        out += `P          : ${e.p}\n`;
        out += `I          : ${e.i}\n`;
        out += `D          : ${e.d}\n`;
        out += `Rating     : ${stars}\n\n`;
      });
      out += "================================================\n";
      out += `  TOTAL SESSIONS LOGGED: ${logs.length}\n`;
      out += "================================================\n";
      downloadFile("pid_log_" + now.replace(/[ :]/g, "-") + ".txt", out);
    }

    function exportMD() {
      const logs = getLogs();
      if (!logs.length) return alert("No logs to export");
      const now = new Date().toISOString().slice(0, 16).replace("T", " ");
      let out = "# PID Tuning Log\n\n";
      out += `_Exported: ${now}_\n\n`;
      out += "| Date/Time | P | I | D | Rating |\n";
      out += "|-----------|---|---|---|--------|\n";
      logs.forEach(e => {
        const stars = "★".repeat(e.rating) + "☆".repeat(5 - e.rating);
        out += `| ${e.datetime} | ${e.p} | ${e.i} | ${e.d} | ${stars} |\n`;
      });
      out += `\n_Total sessions: ${logs.length}_\n`;
      downloadFile("pid_log_" + now.replace(/[ :]/g, "-") + ".md", out);
    }

    // init
    refreshPresetList();
    renderLogs();
  </script>
</body>

</html>
